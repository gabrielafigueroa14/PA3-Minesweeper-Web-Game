<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Game Over</title>
  <style>
    /* Centered container with a bright, colorful theme */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #e8f5e9;
      font-family: 'Arial', sans-serif;
      color: #d32f2f;
    }
    .container {
      text-align: center;
      background: #ffcdd2;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }
    h1 {
      margin-bottom: 20px;
    }
    p {
      font-size: 1.2em;
      margin-bottom: 10px;
    }
    button {
      padding: 10px 20px;
      font-size: 1em;
      background: #e57373;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      color: #fff;
    }
    button:hover {
      background: #d32f2f;
    }
    audio {
        margin-top: 15px;
        outline: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Game Over!</h1>
    <p>Your Score: {{ score }}</p>
    <p>High Score: {{ high_score }}</p>
    <p>Time: {{ time_elapsed }} seconds</p>
    <p id="celebrationTimer">Time since game over: 0 seconds</p> <!-- 🕒 Celebration Timer -->
    <button onclick="tryAgain()">Try Again</button>
  </div>

  <!-- 🎶 Background Defeat Music -->
  <audio id="bgMusic" src="{{ url_for('static', filename='game_over_music.mp3') }}" autoplay loop></audio>


  <script>
      // Timer for time since game over
    let celebrationStartTime = Date.now();
    let celebrationTimerInterval = setInterval(updateCelebrationTimer, 1000);

    function updateCelebrationTimer() {
        const elapsed = Math.floor((Date.now() - celebrationStartTime) / 1000);
        document.getElementById('celebrationTimer').innerText = `Time since game over: ${elapsed} seconds`;
    }

    function tryAgain() {
      window.location.href = '/';
    }
  </script>
</body>
</html>
